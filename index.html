<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TOWA OS" />
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <title>TOWA LIFE OS</title>
  <style>
    :root{
      --bg:#07111f; --bg2:#0b1a2e; --card:#10243b; --card2:#14324a;
      --text:#f3f7fb; --muted:#91a4b8; --line:rgba(255,255,255,.10);
      --accent:#6ee7d8; --green:#74f29a; --red:#ff6b7a; --gold:#ffd166;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:radial-gradient(circle at top left,#17365a 0,#07111f 45%,#050914 100%);
      color:var(--text); min-height:100vh; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    .app{max-width:520px;margin:0 auto;padding:22px 18px 92px}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{
      width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,#80fff3,#5870ff);
      color:#07111f;display:grid;place-items:center;font-weight:900;font-size:26px;
      box-shadow:0 10px 35px rgba(110,231,216,.25)
    }
    h1{font-size:26px;margin:0;letter-spacing:.3px}
    .sub{font-size:13px;color:var(--muted);margin-top:3px}
    .pill{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;padding:10px 13px;color:#dbe7f3;font-size:13px}
    .hero{
      background:linear-gradient(150deg,rgba(110,231,216,.22),rgba(20,50,74,.82));
      border:1px solid rgba(255,255,255,.12); border-radius:34px; padding:24px;
      box-shadow:0 20px 70px rgba(0,0,0,.35); margin-bottom:16px
    }
    .label{color:var(--muted);font-size:14px}
    .big{font-size:48px;font-weight:900;letter-spacing:-1.5px;margin:10px 0 12px}
    .bar{height:16px;border-radius:999px;background:rgba(255,255,255,.13);overflow:hidden;margin:14px 0 16px}
    .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:inherit;transition:.45s}
    .row{display:flex;justify-content:space-between;gap:12px;align-items:center}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
    .mini{background:rgba(5,13,24,.55);border:1px solid rgba(255,255,255,.06);border-radius:22px;padding:16px}
    .mini b{display:block;font-size:25px;margin-top:8px}
    .green{color:var(--green)} .red{color:var(--red)} .gold{color:var(--gold)}
    .card{background:rgba(16,36,59,.86);border:1px solid var(--line);border-radius:26px;padding:20px;margin:14px 0}
    h2{font-size:20px;margin:0 0 14px}
    input,select,button{
      width:100%;border:1px solid var(--line);background:#071525;color:var(--text);
      padding:14px 15px;border-radius:16px;font-size:16px;outline:none
    }
    input:focus,select:focus{border-color:rgba(110,231,216,.65)}
    .formgrid{display:grid;gap:10px}
    .btn{background:linear-gradient(135deg,#49d7c8,#6ee778);color:#06131f;font-weight:900;border:0}
    .ghost{background:rgba(255,255,255,.06);color:var(--text)}
    .danger{background:rgba(255,107,122,.13);color:#ff9aa5}
    .list{display:grid;gap:10px}
    .assetItem{display:flex;justify-content:space-between;gap:12px;background:rgba(255,255,255,.05);padding:14px;border-radius:18px}
    .muted{color:var(--muted)}
    canvas{width:100%;height:190px;background:#071525;border-radius:22px;border:1px solid var(--line)}
    nav{
      position:fixed;left:0;right:0;bottom:0;background:rgba(4,10,18,.92);backdrop-filter:blur(18px);
      border-top:1px solid var(--line);display:flex;justify-content:center;padding:10px 8px calc(10px + env(safe-area-inset-bottom))
    }
    .tabs{max-width:520px;width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .tab{padding:12px 8px;border-radius:18px;text-align:center;color:#b9c7d4;font-size:13px}
    .tab.active{background:rgba(110,231,216,.18);color:white}
    .screen{display:none}.screen.active{display:block}
    .quote{font-size:15px;line-height:1.65;color:#d9e8f1}
    .badge{display:inline-block;padding:7px 10px;border-radius:999px;background:rgba(255,209,102,.13);color:var(--gold);font-weight:800;font-size:13px}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo">T</div>
        <div><h1>TOWA LIFE OS</h1><div class="sub">30歳1000万円までの人生ダッシュボード</div></div>
      </div>
      <div class="pill" id="today"></div>
    </header>

    <section id="home" class="screen active">
      <div class="hero">
        <div class="label">現在の総資産（借金差引）</div>
        <div class="big" id="netWorth">¥0</div>
        <div class="bar"><div class="fill" id="progressFill"></div></div>
        <div class="row"><span class="muted">30歳1,000万円まで</span><b id="remain">¥10,000,000</b></div>
        <div class="grid">
          <div class="mini"><span class="muted">達成率</span><b id="progress">0.0%</b></div>
          <div class="mini"><span class="muted">今月増減</span><b id="monthlyChange" class="green">+¥0</b></div>
          <div class="mini"><span class="muted">生活防衛</span><b id="defense">0.0ヶ月</b></div>
          <div class="mini"><span class="muted">自由レベル</span><b id="level" class="gold">Lv.0</b></div>
        </div>
      </div>
      <div class="card">
        <h2>📈 資産推移</h2>
        <canvas id="chart" width="680" height="260"></canvas>
      </div>
      <div class="card">
        <h2>💬 今日の一言</h2>
        <div class="quote" id="quote"></div>
      </div>
    </section>

    <section id="input" class="screen">
      <div class="card">
        <h2>✍️ 月次入力</h2>
        <div class="formgrid">
          <input id="month" type="month">
          <input id="bank" inputmode="numeric" placeholder="銀行残高">
          <input id="cash" inputmode="numeric" placeholder="現金">
          <input id="paypay" inputmode="numeric" placeholder="PayPay">
          <input id="medals" inputmode="numeric" placeholder="貯玉価値">
          <input id="invest" inputmode="numeric" placeholder="投資資産">
          <input id="other" inputmode="numeric" placeholder="その他資産">
          <input id="debt" inputmode="numeric" placeholder="借金残高">
          <input id="expense" inputmode="numeric" placeholder="月の生活費目安">
          <button class="btn" onclick="saveMonth()">保存する</button>
        </div>
      </div>
      <div class="card">
        <h2>💰 資産内訳</h2>
        <div class="list" id="assetList"></div>
      </div>
    </section>

    <section id="history" class="screen">
      <div class="card">
        <h2>📊 履歴</h2>
        <div class="list" id="historyList"></div>
      </div>
    </section>

    <section id="settings" class="screen">
      <div class="card">
        <h2>⚙️ 設定</h2>
        <div class="formgrid">
          <input id="goal" inputmode="numeric" placeholder="目標金額 例: 10000000">
          <input id="targetAge" inputmode="numeric" placeholder="目標年齢 例: 30">
          <button class="btn" onclick="saveSettings()">設定を保存</button>
          <button class="ghost" onclick="exportData()">バックアップを書き出す</button>
          <button class="danger" onclick="resetAll()">全データ削除</button>
        </div>
      </div>
      <div class="card">
        <span class="badge">Alpha → V1</span>
        <p class="muted">このアプリは端末のブラウザ内に保存されます。GitHubには個人の金額データはアップされません。</p>
      </div>
    </section>
  </div>

  <nav>
    <div class="tabs">
      <div class="tab active" onclick="show('home',this)">🏠 HOME</div>
      <div class="tab" onclick="show('input',this)">✍️ 入力</div>
      <div class="tab" onclick="show('history',this)">📈 履歴</div>
      <div class="tab" onclick="show('settings',this)">⚙️ 設定</div>
    </div>
  </nav>

<script>
const KEY="towa-life-os-v1";
const yen=n=>"¥"+Math.round(Number(n||0)).toLocaleString("ja-JP");
const num=id=>Number((document.getElementById(id).value||"0").replaceAll(",",""));
const quotes=[
 "未来の自由は、今日の1入力から。",
 "昨日より1%自由になろう。",
 "一発逆転より、折れない積み上げ。",
 "30歳の自分が、今日の自分に感謝する。",
 "資産は数字。自由は選択肢。"
];
function load(){return JSON.parse(localStorage.getItem(KEY)||'{"settings":{"goal":10000000,"targetAge":30},"months":[]}')}
function store(d){localStorage.setItem(KEY,JSON.stringify(d))}
let data=load();

function init(){
 const d=new Date();
 today.textContent=`${d.getMonth()+1}月${d.getDate()}日`;
 month.value=d.toISOString().slice(0,7);
 goal.value=data.settings.goal;
 targetAge.value=data.settings.targetAge;
 quote.textContent=quotes[d.getDate()%quotes.length];
 render();
}
function latest(){return data.months[data.months.length-1]||null}
function net(m){return (m.bank+m.cash+m.paypay+m.medals+m.invest+m.other)-m.debt}
function saveMonth(){
 const m={month:month.value,bank:num("bank"),cash:num("cash"),paypay:num("paypay"),medals:num("medals"),invest:num("invest"),other:num("other"),debt:num("debt"),expense:num("expense")};
 const i=data.months.findIndex(x=>x.month===m.month);
 if(i>=0)data.months[i]=m; else data.months.push(m);
 data.months.sort((a,b)=>a.month.localeCompare(b.month));
 store(data); render(); show("home",document.querySelectorAll(".tab")[0]);
}
function saveSettings(){data.settings.goal=num("goal")||10000000; data.settings.targetAge=num("targetAge")||30; store(data); render();}
function render(){
 const m=latest(), goal=data.settings.goal||10000000;
 const current=m?net(m):0, prev=data.months.length>1?net(data.months[data.months.length-2]):0;
 const change=m?current-prev:0, pct=Math.min(100,current/goal*100);
 netWorth.textContent=yen(current); remain.textContent=yen(Math.max(0,goal-current));
 progress.textContent=pct.toFixed(1)+"%"; progressFill.style.width=pct+"%";
 monthlyChange.textContent=(change>=0?"+":"")+yen(change).replace("¥","¥");
 monthlyChange.className=change>=0?"green":"red";
 defense.textContent=m&&m.expense?((m.bank+m.cash+m.paypay)/m.expense).toFixed(1)+"ヶ月":"0.0ヶ月";
 level.textContent="Lv."+Math.floor(pct/10);
 renderAssets(m); renderHistory(); drawChart();
}
function renderAssets(m){
 const items=m?[["銀行",m.bank],["現金",m.cash],["PayPay",m.paypay],["貯玉",m.medals],["投資",m.invest],["その他",m.other],["借金",-m.debt]]:[];
 assetList.innerHTML=items.length?items.map(([k,v])=>`<div class="assetItem"><span>${k}</span><b class="${v<0?'red':''}">${yen(v)}</b></div>`).join(""):'<div class="muted">月次入力すると表示される</div>';
}
function renderHistory(){
 historyList.innerHTML=data.months.length?data.months.slice().reverse().map(m=>`<div class="assetItem"><span>${m.month}</span><b>${yen(net(m))}</b></div>`).join(""):'<div class="muted">まだ履歴はありません</div>';
}
function drawChart(){
 const c=document.getElementById("chart"), ctx=c.getContext("2d"); ctx.clearRect(0,0,c.width,c.height);
 ctx.strokeStyle="rgba(255,255,255,.16)"; ctx.lineWidth=2;
 for(let y=40;y<240;y+=50){ctx.beginPath();ctx.moveTo(50,y);ctx.lineTo(640,y);ctx.stroke();}
 if(data.months.length<2){ctx.fillStyle="#91a4b8";ctx.font="28px sans-serif";ctx.fillText("月次入力するとグラフが出る",160,145);return}
 const vals=data.months.map(net), max=Math.max(...vals,1), min=Math.min(...vals,0), range=max-min||1;
 ctx.strokeStyle="#6ee7d8";ctx.lineWidth=5;ctx.beginPath();
 vals.forEach((v,i)=>{const x=55+i*(570/(vals.length-1)); const y=230-((v-min)/range)*180; if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);});
 ctx.stroke();
}
function show(id,el){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));el.classList.add("active");}
function exportData(){navigator.clipboard.writeText(JSON.stringify(data,null,2)); alert("バックアップをコピーしました");}
function resetAll(){if(confirm("全部消す？")){localStorage.removeItem(KEY); data=load(); render();}}
init();
</script>
</body>
</html>
